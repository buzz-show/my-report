name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # 每周一 UTC 02:00 跑一次依赖安全扫描
    - cron: '0 2 * * 1'

jobs:
  # ── 密钥泄露扫描（最优先，发现即阻断）──────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 拉取完整历史，gitleaks 扫描所有提交
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 静态检查 ────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── 单元测试 + 覆盖率 ───────────────────────────────────
      - name: Unit tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # ── Commit 消息校验（PR 时校验所有提交）────────────────
      - name: Commitlint (PR commits)
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to   ${{ github.event.pull_request.head.sha }} \
            --verbose

      # ── 构建验证 ────────────────────────────────────────────
      - name: Build (renderer + main)
        run: npm run build
        env:
          # 构建时不需要真实 API Key，仅验证编译无报错
          OPENAI_API_KEY: sk-placeholder

  # ── 依赖安全扫描（独立 job，不阻塞 quality）────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: secret-scan
    # push/PR 时也跑，但高危漏洞仅在 main 分支阻断
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 生产依赖只允许 low/moderate，high/critical 直接失败
      - name: npm audit (production, high+critical → fail)
        run: npm audit --omit=dev --audit-level=high

      # 全量扫描（含 devDependencies）仅输出报告，不阻断
      - name: npm audit (all deps, report only)
        run: npm audit --audit-level=none || true
