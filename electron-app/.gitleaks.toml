# Gitleaks 配置：AI 项目密钥泄露规则
# 文档：https://github.com/gitleaks/gitleaks

title = "electron-react-ai-template gitleaks config"

# ── 扩展规则：AI 项目专属 ──────────────────────────────────

[[rules]]
id          = "openai-api-key"
description = "OpenAI API Key"
regex       = '''sk-[A-Za-z0-9]{20,}'''
tags        = ["openai", "ai", "secret"]

[[rules]]
id          = "anthropic-api-key"
description = "Anthropic API Key"
regex       = '''sk-ant-[A-Za-z0-9\-_]{20,}'''
tags        = ["anthropic", "ai", "secret"]

[[rules]]
id          = "generic-api-key-in-env"
description = "硬编码的 API_KEY 字符串字面量赋值（仅匹配引号包裹的值，避免变量引用误报）"
regex       = '''(?i)(api[_\-]?key|apikey)\s*[=:]\s*["'][A-Za-z0-9\-_\.]{16,}["']'''
tags        = ["generic", "secret"]

# ── 全局白名单 ──────────────────────────────────────────────
[allowlist]
description = "已知安全的占位符和测试值"
regexes     = [
  # CI 构建中使用的占位符
  '''sk-placeholder''',
  '''sk-your-api-key-here''',       # .env.example 占位符
  '''sk-x{10,}''',                  # README 中 sk-xxx... 示例
  # .env.example 示例文件允许出现 key 格式
  '''your[_\-]api[_\-]key''',
  '''<your[_\-].*key>''',
]
paths = [
  # 忽略测试文件中的 mock 数据
  '''.*\.test\.(ts|tsx)$''',
  '''.*\.spec\.(ts|tsx)$''',
  # 忽略 gitleaks 自身配置（避免规则 regex 触发自检）
  '''\.gitleaks\.toml''',
  '''\.env\.example''',             # 示例环境变量文件
  '''.*\.md$''',                    # 所有 Markdown 文档
  '''DOC/.*''',                     # 文档目录
]
